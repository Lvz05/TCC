<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelpLife - Suporte e Cuidado Mental</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">
    <div class="background-overlay">
        <img src="https://images.unsplash.com/photo-1758274538961-fe8f1f24166f?w=1920&h=1080&fit=crop" alt="Background" class="background-image">
        <div class="gradient-overlay"></div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="logo-container">
                <svg class="logo-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="45" fill="#10b981" opacity="0.2"/>
                    <path d="M50 20 C30 20, 20 35, 20 50 C20 65, 30 75, 50 85 C70 75, 80 65, 80 50 C80 35, 70 20, 50 20 Z" 
                          fill="#10b981" stroke="#059669" stroke-width="2"/>
                    <circle cx="38" cy="45" r="4" fill="white"/>
                    <circle cx="62" cy="45" r="4" fill="white"/>
                    <path d="M 35 60 Q 50 70 65 60" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
                </svg>
                <div>
                    <h1 class="logo-title">HelpLife</h1>
                    <p class="logo-subtitle">Suporte e Cuidado Mental</p>
                </div>
            </div>

            <div class="welcome-text">
                <h2>Bem-vindo!</h2>
                <p>Entre para acessar nossa plataforma de apoio</p>
            </div>

            <form id="loginForm" class="login-form">
                
                <div class="form-group">
                    <label for="nome">Nome completo</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <input type="text" id="nome" placeholder="Seu nome completo" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">E-mail</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                            <polyline points="22,6 12,13 2,6"></polyline>
                        </svg>
                        <input type="email" id="email" placeholder="seuemail@exemplo.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="telefone">Telefone</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                        </svg>
                        <input type="tel" id="telefone" placeholder="(11) 99999-0000" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        <input type="password" id="password" placeholder="Mínimo 8 caracteres" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Repita sua Senha</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                        </svg>
                        <input type="password" id="confirm-password" placeholder="Confirme sua senha" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-large">Entrar</button>
                <p>Caso já tenha uma conta, <a href="index.html">clique aqui</a></p>
            </form>
        </div>
    </div>


    <script src="code2.js"></script>
</body>
</html>
