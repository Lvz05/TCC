<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelpLife - Suporte e Cuidado Mental</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">
    <!-- Background -->
    <div class="background-overlay">
        <img src="https://images.unsplash.com/photo-1758274538961-fe8f1f24166f?w=1920&h=1080&fit=crop" alt="Background" class="background-image">
        <div class="gradient-overlay"></div>
    </div>

    <!-- o card do -->
    <div class="login-container">
        <div class="login-card">
            <!-- Logo -->
            <div class="logo-container">
                <svg class="logo-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="45" fill="#10b981" opacity="0.2"/>
                    <path d="M50 20 C30 20, 20 35, 20 50 C20 65, 30 75, 50 85 C70 75, 80 65, 80 50 C80 35, 70 20, 50 20 Z" 
                          fill="#10b981" stroke="#059669" stroke-width="2"/>
                    <circle cx="38" cy="45" r="4" fill="white"/>
                    <circle cx="62" cy="45" r="4" fill="white"/>
                    <path d="M 35 60 Q 50 70 65 60" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
                </svg>
                <div>
                    <h1 class="logo-title">HelpLife</h1>
                    <p class="logo-subtitle">Suporte e Cuidado Mental</p>
                </div>
            </div>

            <!-- Welcome Text -->
            <div class="welcome-text">
                <h2>Bem-vindo!</h2>
                <p>Entre para acessar nossa plataforma de apoio</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="5" width="18" height="14" rx="2"/>
                            <path d="M3 7l9 6 9-6"/>
                        </svg>
                        <input type="email" id="email" placeholder="seu@email.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="5" y="11" width="14" height="10" rx="2"/>
                            <path d="M7 11V7a5 5 0 0110 0v4"/>
                        </svg>
                        <input type="password" id="password" placeholder="Mínimo 8 caracteres" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-large">Entrar</button>
                <p>caso não tenha uma conta, <a href="indexc.html"> clique aqui</a> </p>
            </form>
        </div>
    </div>

    <script src="code.js"></script>
</body>
</html>
